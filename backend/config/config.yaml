yaml# Document Processing Configuration
document_processing:
  books_directory: "D:/Books"  # Your existing books collection
  cache_directory: "./data/cache"
  embedding_cache_directory: "./data/embeddings"
  vector_db_path: "./data/vector_db"
  supported_formats:
    - "pdf"
    - "epub"
  chunk_size: 1000
  chunk_overlap: 200
  max_workers: 4  # Adjust based on your CPU cores

# Embedding Configuration
embeddings:
  primary_model: "all-MiniLM-L6-v2"  # Fast, good quality
  multimodal_model: "clip-ViT-B-32"  # For images/diagrams
  batch_size: 32
  device: "cpu"  # Change to "cuda" if you have GPU

# Vector Database Configuration
vector_database:
  provider: "chromadb"
  collection_name: "knowledge_base"
  distance_metric: "cosine"
  embedding_dimension: 384

# Search Configuration  
search:
  default_results: 5
  similarity_threshold: 0.7
  rerank: true
  max_context_length: 4000

# Chat Configuration
chat:
  model_provider: "openrouter"  # Since you used this before
  model_name: "google/gemini-2.0-flash-lite-preview-02-05:free"
  max_tokens: 2048
  temperature: 0.7
  system_message: "You are a helpful AI assistant that answers questions based on the provided document context. Always cite your sources."

# API Configuration (leave empty, will be set via environment or UI)
api:
  openrouter_key: ""
  
# Logging Configuration
logging:
  level: "INFO"
  log_file: "./logs/chatbot.log"
  max_file_size: "10MB"
  backup_count: 5

# UI Configuration
ui:
  title: "AI Knowledge Base Chatbot"
  theme: "default"
  share: false
  server_name: "127.0.0.1"
  server_port: 7860

# Performance Configuration
performance:
  enable_caching: true
  cache_ttl: 3600  # 1 hour in seconds
  parallel_processing: true
  memory_limit: "2GB"
